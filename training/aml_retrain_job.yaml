$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
description: Retrain Akkadian to English translation model (MBart)

experiment_name: akkadian-translation-retrain

compute: azureml:cpu-cluster

environment:
  image: pytorch/pytorch:2.1.2-cuda12.1-cudnn8-runtime

code: .

command: >-
  pip install transformers==4.47.1 datasets==2.14.5 sentencepiece pandas &&
  python train.py
  --train-csv ${{inputs.train_data}}
  --val-csv ${{inputs.validation_data}}

environment_variables:
  OUTPUT_DIR: ./outputs/mbart-finetuned

inputs:
  train_data:
    type: uri_file
    path: ../data/train_cleaned.csv
  validation_data:
    type: uri_file
    path: ../data/validation_cleaned.csv

