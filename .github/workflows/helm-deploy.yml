name: Deploy Helm Chart

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  helm-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        run: |
          az aks get-credentials --resource-group azure-ai --name akk-aks-cluster --overwrite-existing

      - name: Apply Kubernetes secrets
        run: |
          kubectl create secret generic akk-postgres-secret \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic azure-credentials-secret \
            --from-literal=AZURE_CREDENTIALS='${{ secrets.AZURE_CREDENTIALS }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade
        run: |
          helm upgrade --install akkadian-translator infrastructure/helm/akkadian-translator \
            --set global.registry=verstraetewoutmlacr2.azurecr.io \
            --set models.small.version=1 \
            --set models.medium.version=1

      - name: Force rolling restart
        run: |
          kubectl rollout restart deployment/akkadian-translator-frontend
          kubectl rollout restart deployment/akkadian-translator-api-router
          kubectl rollout restart deployment/akkadian-translator-api-small
          kubectl rollout restart deployment/akkadian-translator-api-medium
