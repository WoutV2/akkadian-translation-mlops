name: Daily Feedback Retraining

on:
  schedule:
    # Run every day at midnight (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggers for testing
    inputs:
      model_size:
        description: 'Which model size to retrain'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - small
          - medium
          - large
      force_retrain:
        description: 'Force retraining even if there are no new corrections'
        required: false
        default: false
        type: boolean

jobs:
  check-and-ingest:
    runs-on: [self-hosted, Windows]
    outputs:
      has_changes: ${{ steps.ingest_step.outputs.has_changes }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ingest feedback corrections
        id: ingest_step
        shell: powershell
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          $force_flag = ""
          if ("${{ inputs.force_retrain }}" -eq "true") {
              $force_flag = "--force"
          }
          & "$env:LOCAL_PYTHON_PATH" training/ingest_feedback.py $force_flag

  retrain:
    needs: check-and-ingest
    if: needs.check-and-ingest.outputs.has_changes == 'true' || github.event.inputs.force_retrain == true
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI Extension
        run: |
          az extension add --name ml --yes

      - name: Submit Azure ML Retraining Job
        run: |
          SIZE="${{ github.event.inputs.model_size }}"
          if [ -z "$SIZE" ]; then
            SIZE="all"
          fi
          
          submit_cloud_job() {
            local size=$1
            echo "=========================================================="
            echo "Submitting Azure ML Cloud Job for model-size: $size"
            echo "=========================================================="
            
            # Submit job and extract job name
            JOB_NAME=$(az ml job create \
              --file training/aml_retrain_job.yaml \
              --set inputs.model_size=$size inputs.max_steps=20 \
              --resource-group azure-ai \
              --workspace-name verstraete-wout-ml \
              --query name \
              --output tsv)
              
            echo "Successfully submitted job: $JOB_NAME"
            echo "Streaming logs for $JOB_NAME..."
            az ml job show --name $JOB_NAME --web --stream -g azure-ai -w verstraete-wout-ml
            
            # Check job final status
            STATUS=$(az ml job show --name $JOB_NAME --query status --output tsv -g azure-ai -w verstraete-wout-ml)
            if [ "$STATUS" != "Completed" ]; then
              echo "::error:: Azure ML Job $JOB_NAME failed with status $STATUS"
              exit 1
            fi
            
            echo "Azure ML Job $JOB_NAME completed successfully!"
            echo "Registering fine-tuned model for $size variant..."
            az ml model create \
              --name akkadian-translation-model-$size \
              --path "azureml://jobs/$JOB_NAME/outputs/artifacts/paths/outputs/mbart-finetuned-$size" \
              --type custom_model \
              -g azure-ai \
              -w verstraete-wout-ml
          }
          
          if [ "$SIZE" = "all" ]; then
            submit_cloud_job small
            submit_cloud_job medium
            submit_cloud_job large
          else
            submit_cloud_job $SIZE
          fi

  deploy:
    needs: retrain
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI Extension
        run: |
          az extension add --name ml --yes

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name verstraetewoutmlacr2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Model Versions from Azure ML
        run: |
          # Fetch the latest registered versions for small, medium, and large variants
          LATEST_SMALL=$(az ml model list --name akkadian-translation-model-small --resource-group azure-ai --workspace-name verstraete-wout-ml --query "[0].version" --output tsv 2>/dev/null || echo "1")
          LATEST_MEDIUM=$(az ml model list --name akkadian-translation-model-medium --resource-group azure-ai --workspace-name verstraete-wout-ml --query "[0].version" --output tsv 2>/dev/null || echo "1")
          LATEST_LARGE=$(az ml model list --name akkadian-translation-model-large --resource-group azure-ai --workspace-name verstraete-wout-ml --query "[0].version" --output tsv 2>/dev/null || echo "1")
          
          echo "LATEST_SMALL=$LATEST_SMALL" >> $GITHUB_ENV
          echo "LATEST_MEDIUM=$LATEST_MEDIUM" >> $GITHUB_ENV
          echo "LATEST_LARGE=$LATEST_LARGE" >> $GITHUB_ENV

      - name: Build and Push API Image
        uses: docker/build-push-action@v6
        with:
          context: ./inference/api
          file: inference/api/Dockerfile
          push: true
          tags: |
            verstraetewoutmlacr2.azurecr.io/akk-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set AKS Context
        run: |
          az aks get-credentials --resource-group azure-ai --name akk-aks-cluster --overwrite-existing

      - name: Deploy to AKS
        run: |
          # Apply database credentials as a Kubernetes secret dynamically
          kubectl create secret generic akk-postgres-secret \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --dry-run=client -o yaml | merge=true kubectl apply -f -

          # Apply Azure credentials dynamically for the init containers
          kubectl create secret generic azure-credentials-secret \
            --from-literal=AZURE_CREDENTIALS='${{ secrets.AZURE_CREDENTIALS }}' \
            --dry-run=client -o yaml | kubectl apply -f -
            
          # Replace target versions in manifests
          sed -i "s|MODEL_VERSION_PLACEHOLDER|${{ env.LATEST_SMALL }}|g" infrastructure/k8s/api-deployment-small.yaml
          sed -i "s|MODEL_VERSION_PLACEHOLDER|${{ env.LATEST_MEDIUM }}|g" infrastructure/k8s/api-deployment-medium.yaml
          sed -i "s|MODEL_VERSION_PLACEHOLDER|${{ env.LATEST_LARGE }}|g" infrastructure/k8s/api-deployment-large.yaml

          # Update container image placeholder in manifests to use ACR links
          sed -i "s|myregistry/akk-api:latest|verstraetewoutmlacr2.azurecr.io/akk-api:latest|g" infrastructure/k8s/api-deployment*.yaml
          sed -i 's|myregistry/akk-frontend:latest|verstraetewoutmlacr2.azurecr.io/akk-frontend:latest|g' infrastructure/k8s/frontend-deployment.yaml
          
          # Apply the AKS manifests
          kubectl apply -f infrastructure/k8s/

          # Force rolling restart of the deployments to pull the fresh 'latest' images
          kubectl rollout restart deployment/akk-frontend
          kubectl rollout restart deployment/akk-api
          kubectl rollout restart deployment/akk-api-small
          kubectl rollout restart deployment/akk-api-medium
          kubectl rollout restart deployment/akk-api-large
