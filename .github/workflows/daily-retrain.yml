name: Daily Feedback Retraining

on:
  schedule:
    # Run every day at midnight (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggers for testing

jobs:
  check-and-retrain:
    runs-on: [self-hosted, Windows]
    outputs:
      has_changes: ${{ steps.ingest_step.outputs.has_changes }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ingest feedback corrections
        id: ingest_step
        shell: powershell
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          & "$env:LOCAL_PYTHON_PATH" training/ingest_feedback.py

      - name: Local GPU Retraining
        if: steps.ingest_step.outputs.has_changes == 'true'
        shell: powershell
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FAST_TEST_RUN: "1" # Set to 0 to do full training, or 1 for fast-test run
        run: |
          & "$env:LOCAL_PYTHON_PATH" training/train.py --train-csv data/train_cleaned.csv --val-csv data/validation_cleaned.csv

  deploy:
    needs: check-and-retrain
    if: needs.check-and-retrain.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI Extension
        run: |
          az extension add --name ml --yes

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name verstraetewoutmlacr2

      - name: Download Latest Model from Azure ML Registry
        run: |
          # Find the latest registered version of our translation model
          LATEST_VERSION=$(az ml model list \
            --name akkadian-translation-model \
            --resource-group azure-ai \
            --workspace-name verstraete-wout-ml \
            --query "[0].version" \
            --output tsv)
          
          if [ -n "$LATEST_VERSION" ]; then
            echo "Downloading model version: $LATEST_VERSION"
            az ml model download \
              --name akkadian-translation-model \
              --version "$LATEST_VERSION" \
              --resource-group azure-ai \
              --workspace-name verstraete-wout-ml \
              --download-path ./downloaded_model
            
            mkdir -p ./inference/api/mbart-finetuned
            cp -r ./downloaded_model/akkadian-translation-model/* ./inference/api/mbart-finetuned/
            ls -la ./inference/api/mbart-finetuned
          else
            echo "No registered model version found in registry."
            exit 1
          fi

      - name: Build and Push API Image
        run: |
          docker build \
            -t verstraetewoutmlacr2.azurecr.io/akk-api:latest \
            -t verstraetewoutmlacr2.azurecr.io/akk-api:v$LATEST_VERSION \
            -f inference/api/Dockerfile inference/api
          docker push verstraetewoutmlacr2.azurecr.io/akk-api:latest
          docker push verstraetewoutmlacr2.azurecr.io/akk-api:v$LATEST_VERSION

      - name: Set AKS Context
        run: |
          az aks get-credentials --resource-group azure-ai --name akk-aks-cluster --overwrite-existing

      - name: Deploy to AKS
        run: |
          # Apply database credentials as a Kubernetes secret dynamically
          kubectl create secret generic akk-postgres-secret \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -
            
          # Update container image placeholder in manifest to use the specific model version tag
          sed -i "s|myregistry/akk-api:latest|verstraetewoutmlacr2.azurecr.io/akk-api:v$LATEST_VERSION|g" infrastructure/k8s/api-deployment.yaml
          sed -i 's|myregistry/akk-frontend:latest|verstraetewoutmlacr2.azurecr.io/akk-frontend:latest|g' infrastructure/k8s/frontend-deployment.yaml
          
          # Delete the local statefulset DB manifest and apply AKS manifests
          rm -f infrastructure/k8s/db-statefulset.yaml
          kubectl apply -f infrastructure/k8s/

