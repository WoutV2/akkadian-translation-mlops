name: Azure ML Retraining Pipeline

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'training/**'
      - 'data/**'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI Extension
        run: |
          az extension add --name ml --yes

      - name: Submit Azure ML Retraining Job
        run: |
          az ml job create \
            --file training/aml_retrain_job.yaml \
            --resource-group azure-ai \
            --workspace-name verstraete-wout-ml \
            --stream
