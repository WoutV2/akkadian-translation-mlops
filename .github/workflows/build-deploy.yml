name: Build and Deploy API/Frontend

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'inference/**'
      - 'infrastructure/k8s/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI Extension
        run: |
          az extension add --name ml --yes

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name verstraetewoutmlacr2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get Latest Model Version from Azure ML Registry
        run: |
          # Find the latest registered version of our translation model
          LATEST_VERSION=$(az ml model list \
            --name akkadian-translation-model \
            --resource-group azure-ai \
            --workspace-name verstraete-wout-ml \
            --query "[0].version" \
            --output tsv 2>/dev/null || echo "ERROR")
          
          if [ "$LATEST_VERSION" = "ERROR" ] || [ -z "$LATEST_VERSION" ]; then
            echo "::error:: Model 'akkadian-translation-model' is not registered in the Azure ML workspace 'verstraete-wout-ml' under resource group 'azure-ai'."
            echo "::error:: Please train and register the model first before deploying."
            exit 1
          fi
          
          echo "Latest model version: $LATEST_VERSION"
          echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV

      - name: Build and Push API Image
        uses: docker/build-push-action@v6
        with:
          context: ./inference/api
          file: inference/api/Dockerfile
          push: true
          tags: |
            verstraetewoutmlacr2.azurecr.io/akk-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./inference/frontend
          file: inference/frontend/Dockerfile
          push: true
          tags: |
            verstraetewoutmlacr2.azurecr.io/akk-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set AKS Context
        run: |
          az aks get-credentials --resource-group azure-ai --name akk-aks-cluster --overwrite-existing

      - name: Deploy to AKS
        run: |
          # Apply database credentials as a Kubernetes secret dynamically
          kubectl create secret generic akk-postgres-secret \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Apply Azure credentials dynamically for the init container
          kubectl create secret generic azure-credentials-secret \
            --from-literal=AZURE_CREDENTIALS='${{ secrets.AZURE_CREDENTIALS }}' \
            --dry-run=client -o yaml | kubectl apply -f -
            
          # Update container image placeholder in manifest to use the lightweight API image
          sed -i "s|myregistry/akk-api:latest|verstraetewoutmlacr2.azurecr.io/akk-api:latest|g" infrastructure/k8s/api-deployment.yaml
          sed -i 's|myregistry/akk-frontend:latest|verstraetewoutmlacr2.azurecr.io/akk-frontend:latest|g' infrastructure/k8s/frontend-deployment.yaml
          
          # Replace the model version placeholder in the manifest
          sed -i "s|MODEL_VERSION_PLACEHOLDER|${{ env.LATEST_VERSION }}|g" infrastructure/k8s/api-deployment.yaml

          # Delete the local statefulset DB manifest and apply AKS manifests
          rm -f infrastructure/k8s/db-statefulset.yaml
          kubectl apply -f infrastructure/k8s/
