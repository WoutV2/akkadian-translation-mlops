version: '3.8'

services:
  # The main API gateway (acts as a lightweight router)
  akk-api:
    build:
      context: ./inference/api
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=sqlite:///./feedback.db
      - SERVICE_MODEL_VERSION=router
      - ACTIVE_VERSIONS=small,medium,large
      - SMALL_API_URL=http://akk-api-small:8000
      - MEDIUM_API_URL=http://akk-api-medium:8000
      - LARGE_API_URL=http://akk-api-large:8000
    ports:
      - "8001:8000"
    volumes:
      - ./inference/api:/app
      - ./data:/data
    depends_on:
      - akk-api-small
      - akk-api-medium
      - akk-api-large

  # Small model instance (pruned 2-layer custom model)
  akk-api-small:
    build:
      context: ./inference/api
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=sqlite:///./feedback.db
      - SERVICE_MODEL_VERSION=small
      - MODEL_DIR=/mbart-finetuned-small
    volumes:
      - ./inference/api:/app
      - ./data:/data
      - ./mbart-finetuned-small:/mbart-finetuned-small

  # Medium model instance (pruned 6-layer custom model)
  akk-api-medium:
    build:
      context: ./inference/api
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=sqlite:///./feedback.db
      - SERVICE_MODEL_VERSION=medium
      - MODEL_DIR=/mbart-finetuned-medium
    volumes:
      - ./inference/api:/app
      - ./data:/data
      - ./mbart-finetuned-medium:/mbart-finetuned-medium

  # Large model instance (Default fine-tuned 12-layer model)
  akk-api-large:
    build:
      context: ./inference/api
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=sqlite:///./feedback.db
      - SERVICE_MODEL_VERSION=large
      - MODEL_DIR=/mbart-finetuned
    volumes:
      - ./inference/api:/app
      - ./data:/data
      - ./mbart-finetuned:/mbart-finetuned

  frontend:
    build:
      context: ./inference/frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - akk-api
