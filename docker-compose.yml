version: '3.8'

services:
  akk-api:
    build:
      context: ./inference/api
      dockerfile: Dockerfile
    environment:
      # Use local sqlite by default for quick local testing
      - DATABASE_URL=sqlite:///./feedback.db
      - MODEL_DIR=/mbart-finetuned
    ports:
      - "8001:8000"
    volumes:
      - ./inference/api:/app
      - ./data:/data
      - ./mbart-finetuned:/mbart-finetuned

  frontend:
    build:
      context: ./inference/frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - akk-api

