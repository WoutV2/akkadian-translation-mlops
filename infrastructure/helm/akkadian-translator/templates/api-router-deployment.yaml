apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "akkadian-translator.fullname" . }}-api-router
  labels:
    {{- include "akkadian-translator.labels" . | nindent 4 }}
    component: api-router
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "akkadian-translator.selectorLabels" . | nindent 6 }}
      component: api-router
  template:
    metadata:
      labels:
        {{- include "akkadian-translator.selectorLabels" . | nindent 8 }}
        component: api-router
    spec:
      containers:
      - name: api
        image: "{{ .Values.global.registry }}/{{ .Values.api.image }}:{{ .Values.api.tag }}"
        imagePullPolicy: {{ .Values.api.imagePullPolicy }}
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.postgresSecretName }}
              key: DATABASE_URL
        - name: SERVICE_MODEL_VERSION
          value: "router"
        - name: ACTIVE_VERSIONS
          value: {{ $versions := list }}{{ range $name, $config := .Values.models }}{{ if $config.enabled }}{{ $versions = append $versions $name }}{{ end }}{{ end }}{{ join "," $versions | quote }}
        {{- range $name, $config := .Values.models }}
        {{- if $config.enabled }}
        - name: {{ upper $name }}_API_URL
          value: "http://{{ include "akkadian-translator.fullname" $ }}-api-{{ $name }}:8000"
        {{- end }}
        {{- end }}
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "akkadian-translator.fullname" . }}-api
  labels:
    {{- include "akkadian-translator.labels" . | nindent 4 }}
    component: api-router
spec:
  selector:
    {{- include "akkadian-translator.selectorLabels" . | nindent 4 }}
    component: api-router
  ports:
    - protocol: TCP
      port: {{ .Values.api.service.port }}
      targetPort: 8000
  type: {{ .Values.api.service.type }}
