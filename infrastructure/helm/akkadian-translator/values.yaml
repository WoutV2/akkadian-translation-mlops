# Default values for akkadian-translator.
# This is a YAML-formatted file.

# Global registry configuration
global:
  registry: verstraetewoutmlacr2.azurecr.io

# Secrets names (assumed pre-created by default, or populated dynamically)
secrets:
  postgresSecretName: akk-postgres-secret
  azureCredentialsSecretName: azure-credentials-secret

# Frontend component configuration
frontend:
  image: akk-frontend
  tag: latest
  imagePullPolicy: Always
  replicas: 1
  service:
    port: 80
    type: ClusterIP

# API Router component configuration
api:
  image: akk-api
  tag: latest
  imagePullPolicy: Always
  replicas: 1
  service:
    port: 8000
    type: ClusterIP
  resources:
    requests:
      cpu: "50m"
      memory: "256Mi"
    limits:
      cpu: "300m"
      memory: "512Mi"

# Model variant configurations (dynamic parallel deployments)
models:
  small:
    enabled: true
    version: "1"
    resources:
      requests:
        cpu: "50m"
        memory: "512Mi"
      limits:
        cpu: "1.5"
        memory: "3.5Gi"
  medium:
    enabled: false
    version: "1"
    resources:
      requests:
        cpu: "50m"
        memory: "768Mi"
      limits:
        cpu: "1"
        memory: "4.0Gi"
  large:
    enabled: true
    version: "1"
    resources:
      requests:
        cpu: "50m"
        memory: "1024Mi"
      limits:
        cpu: "1.5"
        memory: "4.5Gi"

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # kubernetes.io/ingress.class: nginx
  hosts:
    - host: ""  # Empty for wildcard IP / default hostname routing
      paths:
        - path: /translate
          pathType: Exact
        - path: /feedback
          pathType: Prefix
        - path: /docs
          pathType: Prefix
        - path: /openapi.json
          pathType: Exact
        - path: /
          pathType: Prefix
