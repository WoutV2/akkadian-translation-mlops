apiVersion: v1
kind: Secret
metadata:
  name: akk-postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: mluser
  POSTGRES_PASSWORD: mlpass
  POSTGRES_DB: feedback

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: akk-postgres
spec:
  selector:
    matchLabels:
      app: akk-postgres
  serviceName: "akk-postgres"
  replicas: 1
  template:
    metadata:
      labels:
        app: akk-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: akk-postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: akk-postgres-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: akk-postgres-secret
              key: POSTGRES_DB
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: pgdata
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: akk-postgres
spec:
  clusterIP: None
  selector:
    app: akk-postgres
  ports:
    - port: 5432
      targetPort: 5432
