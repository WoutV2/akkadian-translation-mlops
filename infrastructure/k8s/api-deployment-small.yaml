apiVersion: apps/v1
kind: Deployment
metadata:
  name: akk-api-small
  labels:
    app: akk-api-small
spec:
  replicas: 1
  selector:
    matchLabels:
      app: akk-api-small
  template:
    metadata:
      labels:
        app: akk-api-small
    spec:
      initContainers:
      - name: model-downloader
        image: mcr.microsoft.com/azure-cli:latest
        env:
        - name: AZURE_CREDENTIALS
          valueFrom:
            secretKeyRef:
              name: azure-credentials-secret
              key: AZURE_CREDENTIALS
        - name: MODEL_VERSION
          value: "MODEL_VERSION_PLACEHOLDER"
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          echo "Parsing credentials..."
          CLIENT_ID=$(echo "$AZURE_CREDENTIALS" | python3 -c "import sys, json; print(json.load(sys.stdin)['clientId'])")
          CLIENT_SECRET=$(echo "$AZURE_CREDENTIALS" | python3 -c "import sys, json; print(json.load(sys.stdin)['clientSecret'])")
          TENANT_ID=$(echo "$AZURE_CREDENTIALS" | python3 -c "import sys, json; print(json.load(sys.stdin)['tenantId'])")
          SUBSCRIPTION_ID=$(echo "$AZURE_CREDENTIALS" | python3 -c "import sys, json; print(json.load(sys.stdin)['subscriptionId'])")

          echo "Logging in to Azure..."
          az login --service-principal -u "$CLIENT_ID" -p "$CLIENT_SECRET" --tenant "$TENANT_ID" > /dev/null
          az account set --subscription "$SUBSCRIPTION_ID"

          echo "Installing Azure ML CLI Extension..."
          az extension add --name ml --yes

          echo "Downloading small model version $MODEL_VERSION..."
          az ml model download \
            --name akkadian-translation-model-small \
            --version "$MODEL_VERSION" \
            --resource-group azure-ai \
            --workspace-name verstraete-wout-ml \
            --download-path /tmp/downloaded_model

          echo "Preparing shared volume..."
          mkdir -p /model-dir
          if [ -d "/tmp/downloaded_model/akkadian-translation-model-small/clean_registration" ]; then
            cp -r /tmp/downloaded_model/akkadian-translation-model-small/clean_registration/* /model-dir/
          elif [ -d "/tmp/downloaded_model/akkadian-translation-model-small/mbart-finetuned-small" ]; then
            cp -r /tmp/downloaded_model/akkadian-translation-model-small/mbart-finetuned-small/* /model-dir/
          else
            cp -r /tmp/downloaded_model/akkadian-translation-model-small/* /model-dir/
          fi
          echo "Done downloading model weights."
        volumeMounts:
        - name: model-volume
          mountPath: /model-dir
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1.5"
            memory: "2.5Gi"
      containers:
      - name: api
        image: myregistry/akk-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: akk-postgres-secret
              key: DATABASE_URL
        - name: SERVICE_MODEL_VERSION
          value: "small"
        - name: MODEL_DIR
          value: "/app/mbart-finetuned-small"
        resources:
          requests:
            cpu: "250m"
            memory: "1.5Gi"
          limits:
            cpu: "500m"
            memory: "2Gi"
        volumeMounts:
        - name: model-volume
          mountPath: /app/mbart-finetuned-small
      volumes:
      - name: model-volume
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: akk-api-small
spec:
  selector:
    app: akk-api-small
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
