apiVersion: apps/v1
kind: Deployment
metadata:
  name: akk-api-medium
  labels:
    app: akk-api-medium
spec:
  replicas: 1
  selector:
    matchLabels:
      app: akk-api-medium
  template:
    metadata:
      labels:
        app: akk-api-medium
    spec:
      containers:
      - name: api
        image: verstraetewoutmlacr2.azurecr.io/akk-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: akk-postgres-secret
              key: DATABASE_URL
        - name: SERVICE_MODEL_SIZE
          value: "medium"
        - name: MODEL_DIR
          value: "/nonexistent"
        resources:
          requests:
            cpu: "250m"
            memory: "2Gi"
          limits:
            cpu: "750m"
            memory: "3.5Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: akk-api-medium
spec:
  selector:
    app: akk-api-medium
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
