apiVersion: apps/v1
kind: Deployment
metadata:
  name: akk-api
  labels:
    app: akk-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: akk-api
  template:
    metadata:
      labels:
        app: akk-api
    spec:
      containers:
      - name: api
        image: myregistry/akk-api:latest   # replaced dynamically in workflow
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: akk-postgres-secret
              key: DATABASE_URL
        - name: SERVICE_MODEL_VERSION
          value: "router"
        - name: ACTIVE_VERSIONS
          value: "small,medium,large"
        - name: SMALL_API_URL
          value: "http://akk-api-small:8000"
        - name: MEDIUM_API_URL
          value: "http://akk-api-medium:8000"
        - name: LARGE_API_URL
          value: "http://akk-api-large:8000"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: akk-api
spec:
  selector:
    app: akk-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
